<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Protected Access</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #dfeffe, #c0ddfb); /* Fading from #dfeffe to #c0ddfb */
    background-size: 300% 300%;
    animation: gradientAnimation 6s ease infinite;
}

@keyframes gradientAnimation {
    0% {
        background-position: 0% 50%;
    }
    50% {
        background-position: 100% 50%;
    }
    100% {
        background-position: 0% 50%;
    }
}

.container {
    background: #fff;
    padding: 40px;
    width: 320px;
    border-radius: 12px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
    text-align: center;
}

h1 {
    margin-bottom: 15px;
    font-size: 28px;
    font-weight: 600;
    color: #333;
}

p {
    color: #666;
    font-size: 16px;
    margin-bottom: 30px;
}

input, button {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    font-size: 16px;
    box-sizing: border-box;
}

input {
    border: 1px solid #ddd;
    margin-bottom: 15px;
    transition: border-color 0.3s;
}

input:focus {
    outline: none;
    border-color: #6a5ff7;
}

button {
    border: none;
    background: #6a5ff7;
    color: white;
    cursor: pointer;
    transition: background-color 0.3s, transform 0.3s;
}

button:hover {
    background: #5a4dd6;
}

button:disabled {
    background: #b4b4b4;
    cursor: not-allowed;
}

.error {
    color: red;
    font-size: 14px;
    margin-top: 10px;
    display: none;
}

.retry-message {
    font-size: 14px;
    color: #ff9800;
    margin-top: 10px;
}

@media (max-width: 480px) {
    .container {
        width: 280px;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>Protected Page</h1>
    <p>Please enter the password to continue</p>

    <input type="password" id="password" placeholder="Enter password">
    <button id="continueBtn" onclick="checkPassword()">Continue</button>

    <div class="error" id="error">Incorrect password</div>
    <div class="retry-message" id="retryMessage"></div>
</div>

<script>
// Base64 encoded password and redirect URL
const encodedPassword = "ZjZmOGJsdWU=";  // "****************" encoded
const encodedRedirectURL = "aHR0cHM6Ly8yOW1pYW9ldC5naXRodWIuaW8vQW5kcmV3X1dlYlBhZ2Uv"; // URL encoded

let correctPassword = atob(encodedPassword);
let redirectURL = atob(encodedRedirectURL);

let maxRetries = 3; // Max number of retries allowed
let attemptCount = 0;

function checkPassword() {
    const input = document.getElementById("password").value;
    const errorElement = document.getElementById("error");
    const retryMessageElement = document.getElementById("retryMessage");
    const continueBtn = document.getElementById("continueBtn");

    if (input === correctPassword) {
        window.location.href = redirectURL;
    } else {
        attemptCount++;
        errorElement.style.display = "block";

        if (attemptCount >= maxRetries) {
            continueBtn.disabled = true;
            retryMessageElement.textContent = "Maximum attempts reached. Please try again later.";
        } else {
            retryMessageElement.textContent = `${maxRetries - attemptCount} attempts remaining.`;
        }
    }
}

document.getElementById("password")
.addEventListener("keypress", function(e) {
    if (e.key === "Enter" && !document.getElementById("continueBtn").disabled) {
        checkPassword();
    }
});
</script>

</body>
</html>
