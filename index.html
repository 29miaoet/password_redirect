<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Redirect</title>

  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #e2e8f0, #cbd5f5);
      color: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      text-align: center;
      max-width: 700px; /* increased width */
      width: 90%;
      padding: 50px; /* more breathing room */
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    }

    h1 {
      margin-bottom: 14px;
      font-size: 2.4rem; /* slightly bigger */
      letter-spacing: 0.5px;
    }

    p {
      color: #475569;
      line-height: 1.6;
      margin: 10px 0;
      font-size: 1.05rem;
    }

    .links {
      margin-top: 25px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    a {
      text-decoration: none;
      background: linear-gradient(135deg, #60a5fa, #818cf8);
      padding: 16px; /* bigger buttons */
      border-radius: 12px;
      color: white;
      font-weight: 500;
      font-size: 1.05rem;
      transition: all 0.25s ease;
      box-shadow: 0 4px 14px rgba(96, 165, 250, 0.3);
    }

    a:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 10px 24px rgba(129, 140, 248, 0.4);
    }

    a:active {
      transform: scale(0.98);
    }

    br {
      display: none;
    }
  </style>

</head>
