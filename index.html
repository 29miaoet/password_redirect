<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Access</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      padding: 40px;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      color: white;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      animation: fadeIn 0.6s ease-out;
    }

    h1 {
      margin-bottom: 10px;
      font-weight: 600;
    }

    p {
      margin-bottom: 25px;
      opacity: 0.85;
      font-size: 0.95rem;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      margin-bottom: 15px;
      font-size: 1rem;
      outline: none;
    }

    input:focus {
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.6);
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      background: white;
      color: #1e3c72;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25);
    }

    .message {
      margin-top: 15px;
      font-size: 0.9rem;
      min-height: 20px;
      transition: opacity 0.3s ease;
    }

    .error {
      color: #ffb3b3;
    }

    .success {
      color: #b8ffb8;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Protected Page</h1>
    <p>Please enter the password to continue.</p>
    <input type="password" id="passwordInput" placeholder="Enter password" />
    <button onclick="checkPassword()">Access</button>
    <div id="message" class="message"></div>
  </div>

  <script>
    const CORRECT_PASSWORD = "29!?wire+SHARK"; // ← Change this
    const REDIRECT_URL = "https://29miaoetlrsdnet.github.io/cyberpatriot_prep/";   // ← Change this

    function checkPassword() {
      const input = document.getElementById("passwordInput").value;
      const message = document.getElementById("message");

      if (input === CORRECT_PASSWORD) {
        message.textContent = "Access granted. Redirecting...";
        message.className = "message success";

        setTimeout(() => {
          window.location.href = REDIRECT_URL;
        }, 1000);
      } else {
        message.textContent = "Incorrect password. Please try again.";
        message.className = "message error";
      }
    }

    // Allow Enter key to submit
    document.getElementById("passwordInput").addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        checkPassword();
      }
    });
  </script>
</body>
</html>
