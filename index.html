<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Sites</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      text-align: center;
      max-width: 500px;
    }
    h1 {
      margin-bottom: 10px;
    }
    p {
      color: #94a3b8;
    }
    .links {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    a {
      text-decoration: none;
      background: #1e293b;
      padding: 12px;
      border-radius: 8px;
      color: #e2e8f0;
      transition: background 0.2s;
    }
    a:hover {
      background: #334155;
    }
  </style>

  <script>
    // JS fallback redirect
    setTimeout(() => {
      window.location.href = "https://site1.example.com";
    }, 2000);
  </script>
</head>
<body>
  <div class="container">
    <h1>My Projects</h1>
    <p>Redirecting to my main site… or choose one below:</p>

    <div class="links">
      <a href="https://site1.example.com">Main Site</a>
      <a href="https://site2.example.com">Project Two</a>
      <a href="https://site3.example.com">Project Three</a>
      <a href="https://site4.example.com">Blog</a>
    </div>
  </div>
</body>
</html>
